services:
  redis:
    image: redis:7-alpine
    container_name: nfe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: nfe-seq
    ports:
      - "8085:80"
      - "5345:5341"
    environment:
      ACCEPT_EULAS: Y

  nfe-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nfe-api
    ports:
      - "5000:8080" # A API externa ficará disponível na porta 5000 do localhost
    environment:
      - ConnectionStrings__Redis=redis:6379
      - Seq__Url=http://seq:5341
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      seq:
        condition: service_started
