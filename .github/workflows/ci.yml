name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NfeEmissor.slnx --locked-mode

      - name: Test
        run: dotnet test tests/Nfe.UnitTests/Nfe.UnitTests.csproj --configuration Release --no-restore

      - name: Build API
        run: dotnet build src/Nfe.Api/Nfe.Api.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack NfeEmissor.Packages.slnx --configuration Release --no-restore --output ./artifacts
