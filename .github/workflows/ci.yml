name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NfeEmissor.slnx

      - name: Test
        run: dotnet test tests/Nfe.UnitTests/Nfe.UnitTests.csproj --configuration Release --no-restore

      - name: Build API
        run: dotnet build src/Nfe.Api/Nfe.Api.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack NfeEmissor.Packages.slnx --configuration Release --no-restore --output ./artifacts
