name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NfeEmissor.slnx --locked-mode

      - name: Test
        run: dotnet test tests/Nfe.UnitTests/Nfe.UnitTests.csproj --configuration Release --no-restore

      - name: Build API
        run: dotnet build src/Nfe.Api/Nfe.Api.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack NfeEmissor.Packages.slnx --configuration Release --no-restore --output ./artifacts
